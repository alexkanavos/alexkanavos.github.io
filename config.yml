baseURL: "https://alexkanavos.com"
title: Alex Kanavos
paginate: 5
theme: PaperMod

enableInlineShortcodes: true
enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false
enableEmoji: true
googleAnalytics: G-58JQY43S0P

minify:
    disableXML: true
    # minifyOutput: true

languages:
    en:
        languageName: "English"
        weight: 1
        menu:
            main:
                - name: About
                  url: about/
                  weight: 1

outputs:
    home:
        - HTML
        - RSS
        - JSON

params:
    env: production # to enable google analytics, opengraph, twitter-cards and schema.
    description: "Personal Website"
    author: Alex Kanavos
    # author: ["Me", "You"] # multiple authors

    defaultTheme: dark
    disableThemeToggle: false
    ShowShareButtons: true
    ShowReadingTime: true
    # disableSpecial1stPost: true
    displayFullLangName: true
    ShowPostNavLinks: true
    ShowBreadCrumbs: true
    ShowCodeCopyButtons: true
    ShowToc: true
    # comments: false
    images: ["images/main.png"]

    profileMode:
        enabled: true
        title: Hey there!
        subtitle: Welcome to my personal website.
        imageUrl: "images/me.jpg"
        imageTitle: me
        #imageWidth: 160
        #imageHeight: 160
        buttons:
            #- name: Archives
            #  url: archives
            #- name: Tags
            #  url: tags

    homeInfoParams:
        Title: "Hey there! \U0001F44B"
        Content: >
            Welcome to my personal website
    socialIcons:
        - name: email
          url: "mailto:alex@alexkanavos.com"
        - name: linkedin
          url: "https://www.linkedin.com/in/alexkanavos/"
        - name: instagram
          url: "https://instagram.com/alex_kanavos/"
        - name: spotify
          url: "https://open.spotify.com/user/cfju19tmga568efqqqvjvnlon/"
        - name: github
          url: "https://github.com/alexkanavos/"

    label:
        #text: ""
        icon: favicon.ico
        iconHeight: 30

    # analytics:
    #     google:
    #         SiteVerificationTag: "XYZabc"

    # assets:
    #     favicon: "<link / abs url>"
    #     favicon16x16: "<link / abs url>"
    #     favicon32x32: "<link / abs url>"
    #     apple_touch_icon: "<link / abs url>"
    #     safari_pinned_tab: "<link / abs url>"

    # cover:
    #     hidden: true # hide everywhere but not in structured data
    #     hiddenInList: true # hide on list pages and home
    #     hiddenInSingle: true # hide on single page

    # fuseOpts:
    #     isCaseSensitive: false
    #     shouldSort: true
    #     location: 0
    #     distance: 1000
    #     threshold: 0.4
    #     minMatchCharLength: 0
    #     keys: ["title", "permalink", "summary", "content"]

disableKinds: ["taxonomy", "taxonomyTerm"]

taxonomies:
    category: categories
    tag: tags
    series: series

markup:
    goldmark:
        renderer:
            unsafe: true
#     highlight:
#         # anchorLineNos: true
#         codeFences: true
#         guessSyntax: true
#         lineNos: true
#         # noClasses: false
#         style: monokai

privacy:
    vimeo:
        disabled: false
        simple: true

    twitter:
        disabled: false
        enableDNT: true
        simple: true

    instagram:
        disabled: false
        simple: true

    youtube:
        disabled: false
        privacyEnhanced: true

services:
    instagram:
        disableInlineCSS: true
    twitter:
        disableInlineCSS: true